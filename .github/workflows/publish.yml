name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump type (ignored if custom_version is set)'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - prepatch
          - preminor
          - premajor
          - prerelease
          - none
      custom_version:
        description: 'Exact version (e.g. 0.1.0). Overrides version type when set.'
        required: false
      prerelease_id:
        description: 'Prerelease identifier for pre* bumps (e.g. "next", "beta")'
        required: false
        default: next
      tag:
        description: 'npm dist-tag'
        required: true
        default: latest
        type: choice
        options:
          - latest
          - next
          - beta
          - alpha
      dry_run:
        description: 'Dry run (no actual publish, no version commit, no git tag)'
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

# Publish target shape:
#
#   npm umbrellas (3):
#     - relayburn                    packages/relayburn/
#     - @relayburn/sdk (napi)        packages/sdk-node/
#     - @relayburn/mcp               packages/mcp/
#
#   Per-platform binary packages (8):
#     - @relayburn/cli-<short>       packages/relayburn/npm/<short>/  (Rust burn binary)
#     - @relayburn/sdk-<short>       packages/sdk-node/npm/<short>/   (napi-rs .node)
#
# Total: 11 npm packages. The five legacy TypeScript implementation packages
# (`@relayburn/{reader,ledger,analyze,ingest,cli}`) are intentionally not
# in the publish loop — `npm deprecate` for those is a manual post-cutover
# step.
#
# crates.io still ships exactly two crates (`relayburn-sdk` + `relayburn-cli`).

jobs:
  # Compute the release version BEFORE the build matrices kick off so the
  # CLI and napi reusable workflows can sed Cargo.toml's workspace version
  # to the post-bump value before `cargo build` runs. Without this, the
  # `burn` binary inside `@relayburn/cli-<short>@N+1` would carry the
  # pre-bump (`N`) `CARGO_PKG_VERSION` baked in by clap's `version,`
  # directive, so `burn --version` would report the previous release
  # forever (the original 2026-05-04 incident: 2.1.0 platform package
  # shipping a 2.0.0 binary).
  #
  # **This job is the single source of truth for the release version.**
  # It runs the same heal-baseline + bump logic the publish job used to
  # run inline, and the publish job below now consumes this output
  # rather than recomputing. That eliminates the race window where
  # local-vs-npm version drift between the precursor's checkout and the
  # publish job's checkout could yield different "next release" values
  # — and with it the echo chamber where build-cli's smoke test asserted
  # against the same stale value baked into the binary.
  #
  # The job mutates package.json files in its own runner's filesystem
  # (the heal step uses `npm version --allow-same-version`); those
  # mutations are scoped to this job and don't affect the publish job's
  # fresh checkout.
  resolve-release-version:
    name: Resolve release version
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.compute.outputs.release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22.14.0'
          registry-url: 'https://registry.npmjs.org'

      # Mirror the target table the publish job uses so the heal step
      # below sees the same 11 packages. Kept in sync by hand — there's
      # no clean way to share an output across jobs without making the
      # publish job depend on this one twice (which we already do).
      - name: Resolve target packages
        id: targets
        run: |
          {
            echo 'targets<<EOF'
            echo 'cli-darwin-arm64:packages/relayburn/npm/darwin-arm64'
            echo 'cli-darwin-x64:packages/relayburn/npm/darwin-x64'
            echo 'cli-linux-arm64-gnu:packages/relayburn/npm/linux-arm64-gnu'
            echo 'cli-linux-x64-gnu:packages/relayburn/npm/linux-x64-gnu'
            echo 'sdk-darwin-arm64:packages/sdk-node/npm/darwin-arm64'
            echo 'sdk-darwin-x64:packages/sdk-node/npm/darwin-x64'
            echo 'sdk-linux-arm64-gnu:packages/sdk-node/npm/linux-arm64-gnu'
            echo 'sdk-linux-x64-gnu:packages/sdk-node/npm/linux-x64-gnu'
            echo 'sdk:packages/sdk-node'
            echo 'mcp:packages/mcp'
            echo 'relayburn:packages/relayburn'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      # Heal step — verbatim copy of the publish job's "Heal local
      # versions to lockstep baseline" logic. Pulls every keeper up to
      # the highest stable version across (local versions ∪ npm latest)
      # so the bump applied below operates on a coherent baseline. If
      # this step is missing, a workspace where one keeper's local
      # version lags its own npm `latest` (the recovery case the heal
      # was originally added for) would cause the precursor and the
      # publish job to disagree on the next release version.
      - name: Heal local versions to lockstep baseline
        env:
          TARGETS: ${{ steps.targets.outputs.targets }}
        run: |
          set -euo pipefail
          cat > /tmp/lockstep-heal.mjs << 'HEALEOF'
          import { execSync } from 'node:child_process';
          import { readFileSync } from 'node:fs';

          const raw = process.env.TARGETS || '';
          const entries = raw.split('\n').map((l) => l.trim()).filter(Boolean).map((line) => {
            const idx = line.indexOf(':');
            return { key: line.slice(0, idx), dir: line.slice(idx + 1) };
          });

          const cmp = (a, b) => {
            const pa = a.split('.').map(Number);
            const pb = b.split('.').map(Number);
            for (let i = 0; i < 3; i++) {
              const da = pa[i] || 0;
              const db = pb[i] || 0;
              if (da !== db) return da - db;
            }
            return 0;
          };
          const isStable = (v) => typeof v === 'string' && /^\d+\.\d+\.\d+$/.test(v);

          const info = entries.map(({ key, dir }) => {
            const json = JSON.parse(readFileSync(`${dir}/package.json`, 'utf8'));
            let npmHighest = null;
            try {
              const out = execSync(`npm view ${json.name} versions --json`, {
                encoding: 'utf8',
                stdio: ['ignore', 'pipe', 'ignore'],
              }).trim() || '[]';
              const parsed = JSON.parse(out);
              const arr = Array.isArray(parsed) ? parsed : [parsed];
              const stable = arr.filter(isStable).sort(cmp);
              if (stable.length) npmHighest = stable[stable.length - 1];
            } catch {
              // unpublished package: leave npmHighest null
            }
            return { key, dir, name: json.name, local: json.version, npmHighest };
          });

          const candidates = info.flatMap((e) => [e.local, e.npmHighest]).filter(isStable);
          if (candidates.length === 0) {
            console.log('Lockstep baseline: (no stable versions yet, skipping heal)');
            process.exit(0);
          }
          candidates.sort(cmp);
          const baseline = candidates[candidates.length - 1];
          console.log(`Lockstep baseline: ${baseline}`);

          const heals = [];
          for (const e of info) {
            const remote = e.npmHighest ?? 'unpublished';
            if (isStable(e.local) && cmp(e.local, baseline) < 0) {
              heals.push(e);
              console.log(`  ${e.name}: local=${e.local} npm=${remote} — healing to ${baseline}`);
            } else {
              console.log(`  ${e.name}: local=${e.local} npm=${remote} — OK`);
            }
          }

          for (const e of heals) {
            execSync(`npm version ${baseline} --no-git-tag-version --allow-same-version`, {
              cwd: e.dir,
              stdio: 'inherit',
            });
          }

          if (heals.length === 0) {
            console.log('All packages at baseline — no heal needed.');
          } else {
            console.log(`Healed ${heals.length} package(s) up to ${baseline}.`);
          }
          HEALEOF

          node /tmp/lockstep-heal.mjs

      # After heal, every keeper is at the same baseline. Bump the
      # umbrella to derive the next release version — the other 10
      # packages will be set to this same value by the publish job
      # downstream, so the umbrella is a sufficient anchor.
      - name: Compute next release version
        id: compute
        run: |
          set -euo pipefail
          CUSTOM='${{ github.event.inputs.custom_version }}'
          BUMP='${{ github.event.inputs.version }}'
          PREID='${{ github.event.inputs.prerelease_id }}'

          pushd packages/relayburn > /dev/null
          if [ -n "$CUSTOM" ]; then
            npm version "$CUSTOM" --no-git-tag-version --allow-same-version
          elif [ "$BUMP" = "none" ]; then
            : # keep existing version (post-heal baseline = "current")
          elif [[ "$BUMP" == pre* ]]; then
            npm version "$BUMP" --no-git-tag-version --preid="$PREID"
          else
            npm version "$BUMP" --no-git-tag-version
          fi
          NEW=$(node -p "require('./package.json').version")
          popd > /dev/null

          echo "release_version=$NEW" >> "$GITHUB_OUTPUT"
          echo "Resolved release_version: $NEW"

  # Build the four `burn` binaries the platform packages need before publish.
  # `cli-build.yml` is a reusable workflow that runs the same matrix it
  # validates on PRs and uploads `relayburn-cli-<short>` artifacts.
  build-cli:
    name: Build CLI binaries
    needs: resolve-release-version
    uses: ./.github/workflows/cli-build.yml
    with:
      release_version: ${{ needs.resolve-release-version.outputs.release_version }}
    secrets: inherit

  # Build the four napi-rs `.node` artifacts the SDK platform packages need.
  build-sdk:
    name: Build SDK napi bindings
    needs: resolve-release-version
    uses: ./.github/workflows/napi-build.yml
    with:
      release_version: ${{ needs.resolve-release-version.outputs.release_version }}
    secrets: inherit

  publish:
    runs-on: ubuntu-latest
    # `resolve-release-version` is already a transitive dep via
    # build-cli/build-sdk, but listing it explicitly lets this job read
    # `needs.resolve-release-version.outputs.release_version` directly.
    needs: [build-cli, build-sdk, resolve-release-version]
    outputs:
      versions: ${{ steps.bump.outputs.versions }}
      release_version: ${{ steps.bump.outputs.release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22.14.0'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install --frozen-lockfile

      # Packages publish in lockstep. Build + test the whole workspace so every
      # package's dist/ is fresh before `pnpm pack` rewrites workspace:* deps
      # to concrete versions at pack time.
      - name: Build workspace
        run: pnpm -r run build

      - name: Run tests
        run: pnpm run test

      # Rust port build + test gates the whole publish job. If the Rust
      # tree is red at this commit, abort before npm ships anything so the
      # release tag points at a commit where both trees pass.
      #
      # `rustup toolchain install` (no args) reads rust-toolchain.toml and
      # installs both the channel and the listed components — no explicit
      # `rustup component add` needed.
      - name: Setup Rust toolchain
        run: rustup toolchain install

      - name: Cargo build + test
        run: |
          cargo build --workspace --all-targets
          cargo test --workspace

      # The 11-package target table. Each entry is `key:dir` where:
      #   - `key` is the suffix used for git tags and changelog identifiers
      #     (so `mcp` → tag `mcp-v<ver>`, `relayburn` → `relayburn-v<ver>`,
      #     `sdk` → `sdk-v<ver>`, platform packages → `cli-darwin-arm64-v<ver>`
      #     etc.). Distinct from the npm package name (read from each
      #     directory's `package.json`).
      #   - `dir` is the relative path to the package directory.
      #
      # The order matters for two reasons:
      #   1. The `relayburn` umbrella's optionalDependencies must be synced
      #      after platform versions are bumped (handled in the bump step).
      #   2. The publish loop ships platform packages BEFORE the umbrella
      #      that depends on them, so `npm install relayburn` post-publish
      #      can resolve all four `@relayburn/cli-<short>` optionalDeps.
      #
      # `@relayburn/sdk` (napi umbrella) similarly ships after its platform
      # packages.
      - name: Resolve target packages
        id: targets
        run: |
          {
            echo 'targets<<EOF'
            echo 'cli-darwin-arm64:packages/relayburn/npm/darwin-arm64'
            echo 'cli-darwin-x64:packages/relayburn/npm/darwin-x64'
            echo 'cli-linux-arm64-gnu:packages/relayburn/npm/linux-arm64-gnu'
            echo 'cli-linux-x64-gnu:packages/relayburn/npm/linux-x64-gnu'
            echo 'sdk-darwin-arm64:packages/sdk-node/npm/darwin-arm64'
            echo 'sdk-darwin-x64:packages/sdk-node/npm/darwin-x64'
            echo 'sdk-linux-arm64-gnu:packages/sdk-node/npm/linux-arm64-gnu'
            echo 'sdk-linux-x64-gnu:packages/sdk-node/npm/linux-x64-gnu'
            echo 'sdk:packages/sdk-node'
            echo 'mcp:packages/mcp'
            echo 'relayburn:packages/relayburn'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      # Apply the release version computed by `resolve-release-version`
      # to every keeper's package.json. The precursor is the single
      # source of truth for what version we're shipping; we don't
      # recompute heal+bump here because that's exactly the path that
      # let the precursor and publish job disagree (and let stale
      # `CARGO_PKG_VERSION` leak into shipped binaries while the
      # cli-build smoke test agreed with itself on the wrong number).
      #
      # `--allow-same-version` lets us idempotently set every package
      # to the target version, including ones that already happen to
      # match (the heal step in the precursor may have already brought
      # them to the same baseline, and the package.json on disk here is
      # a fresh checkout that hasn't seen any of that).
      - name: Apply release version to all packages
        id: bump
        env:
          TARGETS: ${{ steps.targets.outputs.targets }}
          RELEASE_VER: ${{ needs.resolve-release-version.outputs.release_version }}
        run: |
          set -euo pipefail

          VERSIONS=""
          while IFS=: read -r key dir; do
            [ -z "$key" ] && continue
            pushd "$dir" > /dev/null
            npm version "$RELEASE_VER" --no-git-tag-version --allow-same-version
            popd > /dev/null
            VERSIONS+=" $key:$RELEASE_VER"
          done <<< "$TARGETS"

          echo "versions=${VERSIONS# }" >> "$GITHUB_OUTPUT"
          echo "release_version=$RELEASE_VER" >> "$GITHUB_OUTPUT"

          # Sync the umbrella `relayburn` and `@relayburn/sdk` (napi)
          # optionalDependencies to the lockstep version. Both umbrellas
          # resolve their per-platform packages by exact version, so the
          # specifiers must move whenever the platform packages do.
          node --input-type=module <<'SYNCEOF'
          import { readFileSync, writeFileSync } from 'node:fs';

          const formatJson = (value) => `${JSON.stringify(value, null, 2)}\n`;

          // relayburn (cli umbrella) → 4 × @relayburn/cli-<short>.
          const cliShorts = ['darwin-arm64', 'darwin-x64', 'linux-arm64-gnu', 'linux-x64-gnu'];
          const relayburnPath = 'packages/relayburn/package.json';
          const relayburn = JSON.parse(readFileSync(relayburnPath, 'utf8'));
          const relayburnVersion = relayburn.version;
          relayburn.optionalDependencies = Object.fromEntries(
            cliShorts.map((short) => [`@relayburn/cli-${short}`, relayburnVersion]),
          );
          writeFileSync(relayburnPath, formatJson(relayburn));

          // @relayburn/sdk (napi umbrella) → 4 × @relayburn/sdk-<short>.
          const sdkPath = 'packages/sdk-node/package.json';
          const sdk = JSON.parse(readFileSync(sdkPath, 'utf8'));
          const sdkVersion = sdk.version;
          sdk.optionalDependencies = Object.fromEntries(
            cliShorts.map((short) => [`@relayburn/sdk-${short}`, sdkVersion]),
          );
          writeFileSync(sdkPath, formatJson(sdk));

          console.log(`relayburn@${relayburnVersion}: optionalDependencies synced.`);
          console.log(`@relayburn/sdk@${sdkVersion}: optionalDependencies synced.`);
          SYNCEOF

          # Lockstep the Rust workspace to the npm version. Any package's
          # post-bump version works since they're all equal after the bump.
          # The cli/sdk-node path-deps on relayburn-sdk pin MAJOR.MINOR
          # (caret semantics) so the constraint only needs rewriting on
          # minor/major bumps; patch bumps no-op the sed.
          RUST_VER="$RELEASE_VER"
          RUST_MINOR=$(echo "$RUST_VER" | awk -F. '{print $1"."$2}')
          echo "Rust workspace lockstep: $RUST_VER (minor pin: $RUST_MINOR)"

          sed -i -E "s/^version = \"[^\"]+\"$/version = \"$RUST_VER\"/" Cargo.toml
          for crate in relayburn-cli relayburn-sdk-node; do
            sed -i -E "s|(relayburn-sdk = \\{ path = \"\\.\\./relayburn-sdk\", version = \")[^\"]+(\" \\})|\\1$RUST_MINOR\\2|" "crates/$crate/Cargo.toml"
          done

          # Refresh Cargo.lock to reflect the new workspace version.
          cargo update --workspace

      # Belt-and-suspenders alongside the precursor's heal: even if the
      # local→npm baseline was in sync there, the computed release
      # version might collide with an existing version (e.g. someone
      # manually published a one-off from another branch between when
      # the precursor ran and now). Catch it before we waste a build +
      # before npm rejects with a less specific error.
      - name: Verify new versions are not yet published
        env:
          TARGETS: ${{ steps.targets.outputs.targets }}
        run: |
          set -euo pipefail
          declare -A DIRS
          while IFS=: read -r key dir; do
            [ -z "$key" ] && continue
            DIRS[$key]="$dir"
          done <<< "$TARGETS"

          for entry in ${{ steps.bump.outputs.versions }}; do
            key="${entry%%:*}"
            ver="${entry##*:}"
            dir="${DIRS[$key]}"
            NPM_NAME=$(node -p "require('./$dir/package.json').name")
            EXISTS=$(npm view "$NPM_NAME@$ver" version 2>/dev/null || true)
            if [ -n "$EXISTS" ]; then
              echo "::error title=Version already published::$NPM_NAME@$ver is already on npm. Pick a different bump type or set custom_version to a higher version."
              exit 1
            fi
            echo "$NPM_NAME@$ver: unpublished — OK"
          done

      # Per-package CHANGELOG.md generation. For each TS-only package being
      # published (mcp, relayburn umbrella, @relayburn/sdk napi umbrella):
      #
      #   1. If `## [Unreleased]` contains hand-curated content, promote it
      #      verbatim into the new `## [x.y.z] - DATE` block, then reset
      #      `## [Unreleased]` to empty. This is the authoritative path.
      #   2. Otherwise, fall back to inferring a block from `git log` since
      #      the last `<key>-v*` tag. Bucketing prefers Conventional Commits
      #      prefixes (feat:/fix:/refactor:) and falls back to imperative-verb
      #      inference. Unclassified commits land in `Changed` so nothing
      #      gets silently dropped.
      #   3. Skips silently for prereleases (version contains `-`) and for
      #      first publishes where neither Unreleased nor a prior tag exists.
      #
      # The 8 platform packages get a minimal stub entry — they don't have
      # narrative changelogs, just version stamps tracking the umbrella.
      - name: Generate changelogs
        if: ${{ github.event.inputs.version != 'none' || github.event.inputs.custom_version != '' }}
        env:
          TARGETS: ${{ steps.targets.outputs.targets }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          cat > /tmp/gen-changelog.mjs << 'GENEOF'
          import { execSync } from 'node:child_process';
          import { readFileSync, writeFileSync, existsSync } from 'node:fs';

          const [,, key, dir, newVersion, today] = process.argv;
          const path = `${dir}/CHANGELOG.md`;

          if (newVersion.includes('-')) {
            console.log(`prerelease ${key}@${newVersion}: skipping`);
            process.exit(0);
          }

          // Platform packages live under `packages/<umbrella>/npm/<short>/`
          // and don't ship hand-curated changelogs. Skip them: they're
          // covered by the umbrella's narrative + their git tag.
          const isPlatformPackage = dir.includes('/npm/');
          if (isPlatformPackage && !existsSync(path)) {
            console.log(`${key}: platform package without CHANGELOG.md, skipping`);
            process.exit(0);
          }

          const existing = existsSync(path) ? readFileSync(path, 'utf-8') : '';
          if (existing.includes(`## [${newVersion}]`)) {
            console.log(`${path} already has ${newVersion}, skipping`);
            process.exit(0);
          }

          const tagPrefix = `${key}-v`;
          const tags = execSync(`git tag -l '${tagPrefix}*' --sort=-v:refname`, { encoding: 'utf-8' })
            .trim().split('\n').filter(Boolean);
          const semverRe = new RegExp(`^${tagPrefix.replace(/\./g, '\\.')}\\d+\\.\\d+\\.\\d+$`);
          const lastTag = tags.find((t) => semverRe.test(t));

          // --- Step 1: extract any hand-curated [Unreleased] content. ---
          // We slice from the header line to the next `## [` (or EOF) so the
          // whole contiguous block is a single span we can reset.
          function splitAtUnreleased(raw) {
            const headerRe = /^## \[Unreleased\][^\n]*\n/m;
            const headerMatch = raw.match(headerRe);
            if (!headerMatch) return null;
            const headerStart = headerMatch.index;
            const afterHeader = headerStart + headerMatch[0].length;
            const tail = raw.slice(afterHeader);
            const nextMatch = tail.match(/^## \[/m);
            const bodyEnd = nextMatch ? afterHeader + nextMatch.index : raw.length;
            return {
              before: raw.slice(0, headerStart),
              headerLine: headerMatch[0], // includes trailing newline
              body: raw.slice(afterHeader, bodyEnd),
              after: raw.slice(bodyEnd),
            };
          }

          const parts = splitAtUnreleased(existing);
          const unreleasedBody = parts ? parts.body.trim() : '';

          // --- Step 2: build the new version block body. ---
          let newEntryBody = '';
          if (unreleasedBody.length > 0) {
            // Promote Unreleased verbatim. Curated text wins over commit log.
            newEntryBody = unreleasedBody + '\n';
            console.log(`${key}: promoting [Unreleased] content into ${newVersion}`);
          } else if (!lastTag) {
            console.log(`${key}: empty [Unreleased] and no prior stable tag, skipping`);
            process.exit(0);
          } else {
            const log = execSync(
              `git log ${lastTag}..HEAD --pretty=format:"%H|%s|%b%x00" --no-merges -- ${dir}`,
              { encoding: 'utf-8' }
            ).trim();
            if (!log) {
              console.log(`${key}: empty [Unreleased] and no commits since ${lastTag}, skipping`);
              process.exit(0);
            }

            const commits = log.split('\0').filter(Boolean).map((record) => {
              const idx = record.indexOf('|');
              const idx2 = record.indexOf('|', idx + 1);
              return {
                subject: record.slice(idx + 1, idx2).trim(),
                body: record.slice(idx2 + 1).trim(),
              };
            });

            const extractPR = (subject, body) => {
              const m = (subject + ' ' + body).match(/#(\d+)/);
              return m ? `(#${m[1]})` : '';
            };
            const formatTitle = (subject) => {
              const cleaned = subject
                .replace(/^(feat|fix|refactor|perf|chore|test|ci|docs|build|style)(\([^)]+\))?!?:\s*/i, '')
                .replace(/\s*\(#\d+\)\s*$/, '');
              return cleaned.charAt(0).toUpperCase() + cleaned.slice(1);
            };
            const getType = (subject) => {
              const m = subject.match(/^(feat|fix|refactor|perf|chore|test|ci|docs|build|style)(\([^)]+\))?(!)?:/i);
              if (m) {
                const type = m[1].toLowerCase();
                const scope = (m[2] || '').replace(/[()]/g, '');
                if (m[3] === '!') return 'breaking';
                if (type === 'feat') return 'feat';
                if (type === 'fix') return 'fix';
                if (type === 'refactor' || type === 'perf' || type === 'build') return 'changed';
                if (type === 'test' || type === 'ci') return 'reliability';
                if (type === 'chore' && scope === 'release') return 'release';
                if (type === 'chore') return 'deps';
                return 'other';
              }
              const trimmed = subject.trim();
              if (/^(add|implement|introduce|create|support|enable|expose|wire|allow)\b/i.test(trimmed)) return 'feat';
              if (/^(fix|resolve|correct|patch|prevent|guard|stop)\b/i.test(trimmed)) return 'fix';
              if (
                /^(refactor|rename|extract|reorganize|restructure|simplify|move|split|consolidate|rewrite|replace)\b/i.test(trimmed) ||
                /^(update|bump|upgrade|migrate|switch|tighten|loosen|tweak|adjust|improve|clarify|polish|cleanup|clean\s+up|harden)\b/i.test(trimmed)
              ) return 'changed';
              if (/^(test|cover|verify)\b/i.test(trimmed)) return 'reliability';
              if (/^(document|docs?\b|readme)\b/i.test(trimmed)) return 'docs';
              return 'other';
            };

            const cats = { breaking: [], feat: [], fix: [], changed: [], reliability: [], deps: [], release: [], docs: [], other: [] };
            for (const c of commits) {
              const type = getType(c.subject);
              cats[type].push({ title: formatTitle(c.subject), pr: extractPR(c.subject, c.body) });
            }

            const sections = [
              ['Breaking Changes', cats.breaking, true],
              ['Added', cats.feat, true],
              ['Fixed', cats.fix, false],
              ['Changed', [...cats.changed, ...cats.other], false],
              ['Reliability', cats.reliability, false],
              ['Documentation', cats.docs, false],
              ['Dependencies', cats.deps, false],
            ];

            const bodyLines = [];
            let anyContent = false;
            for (const [header, bucket, bold] of sections) {
              if (bucket.length === 0) continue;
              anyContent = true;
              bodyLines.push(`### ${header}`, '');
              for (const c of bucket) {
                const title = bold ? `**${c.title}**` : c.title;
                bodyLines.push(`- ${title}${c.pr ? ' ' + c.pr : ''}`);
              }
              bodyLines.push('');
            }
            if (!anyContent) {
              bodyLines.push('### Released', '', `- v${newVersion}`, '');
            }
            newEntryBody = bodyLines.join('\n');
            console.log(`${key}: inferred ${newVersion} body from git log`);
          }

          const newEntry = `## [${newVersion}] - ${today}\n\n${newEntryBody}`;

          // --- Step 3: write the file with Unreleased reset + new block. ---
          if (!existing) {
            const npmName = JSON.parse(readFileSync(`${dir}/package.json`, 'utf-8')).name;
            const header = `# Changelog\n\nAll notable changes to \`${npmName}\` will be documented in this file.\n\nThe format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),\nand this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).\n\n## [Unreleased]\n\n`;
            writeFileSync(path, header + newEntry + '\n');
          } else if (parts) {
            // Reset Unreleased body to empty (single blank line after header)
            // and insert the new version block directly after.
            const rebuilt =
              parts.before +
              parts.headerLine +
              '\n' +
              newEntry +
              (parts.after.startsWith('\n') ? '' : '\n') +
              parts.after;
            writeFileSync(path, rebuilt);
          } else {
            // No [Unreleased] section in existing file — insert before first
            // versioned entry, or append if none.
            const firstVer = existing.match(/\n## \[\d/);
            if (firstVer && firstVer.index !== undefined) {
              writeFileSync(
                path,
                existing.slice(0, firstVer.index + 1) + newEntry + '\n' + existing.slice(firstVer.index + 1),
              );
            } else {
              writeFileSync(path, existing.trimEnd() + '\n\n' + newEntry + '\n');
            }
          }
          console.log(`${path} updated with ${newVersion}`);
          GENEOF

          declare -A DIRS
          while IFS=: read -r key dir; do
            [ -z "$key" ] && continue
            DIRS[$key]="$dir"
          done <<< "$TARGETS"

          for entry in ${{ steps.bump.outputs.versions }}; do
            key="${entry%%:*}"
            version="${entry##*:}"
            dir="${DIRS[$key]}"
            node /tmp/gen-changelog.mjs "$key" "$dir" "$version" "$TODAY"
          done

      # Root CHANGELOG.md gets the same Unreleased→[x.y.z] promotion the
      # per-package files just got, anchored on the umbrella version (every
      # keeper ships at the same version, so any of them works as the
      # release stamp). No git-log fallback — the root file is a hand-
      # curated cross-package narrative, so an empty [Unreleased] means
      # "no narrative-worthy changes this release" and we leave the file
      # alone rather than inventing bullets.
      - name: Generate root changelog
        if: ${{ github.event.inputs.version != 'none' || github.event.inputs.custom_version != '' }}
        env:
          RELEASE_VERSION: ${{ steps.bump.outputs.release_version }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          cat > /tmp/gen-root-changelog.mjs << 'GENEOF'
          import { readFileSync, writeFileSync, existsSync } from 'node:fs';

          const [,, newVersion, today] = process.argv;
          const path = 'CHANGELOG.md';

          if (!newVersion) {
            console.log('root changelog: no release version supplied, skipping');
            process.exit(0);
          }
          if (newVersion.includes('-')) {
            console.log('root changelog: prerelease bump, skipping');
            process.exit(0);
          }

          if (!existsSync(path)) {
            console.log(`root changelog: ${path} not found, skipping`);
            process.exit(0);
          }
          const existing = readFileSync(path, 'utf-8');
          if (existing.includes(`## [${newVersion}]`)) {
            console.log(`root changelog: already has ${newVersion}, skipping`);
            process.exit(0);
          }

          // Same slicer as the per-package generator.
          function splitAtUnreleased(raw) {
            const headerRe = /^## \[Unreleased\][^\n]*\n/m;
            const headerMatch = raw.match(headerRe);
            if (!headerMatch) return null;
            const headerStart = headerMatch.index;
            const afterHeader = headerStart + headerMatch[0].length;
            const tail = raw.slice(afterHeader);
            const nextMatch = tail.match(/^## \[/m);
            const bodyEnd = nextMatch ? afterHeader + nextMatch.index : raw.length;
            return {
              before: raw.slice(0, headerStart),
              headerLine: headerMatch[0],
              body: raw.slice(afterHeader, bodyEnd),
              after: raw.slice(bodyEnd),
            };
          }

          const parts = splitAtUnreleased(existing);
          if (!parts) {
            console.log('root changelog: no [Unreleased] header, skipping');
            process.exit(0);
          }
          const body = parts.body.trim();
          if (body.length === 0) {
            console.log(`root changelog: [Unreleased] is empty, skipping ${newVersion} stamp`);
            process.exit(0);
          }

          const newEntry = `## [${newVersion}] - ${today}\n\n${body}\n`;
          const rebuilt =
            parts.before +
            parts.headerLine +
            '\n' +
            newEntry +
            (parts.after.startsWith('\n') ? '' : '\n') +
            parts.after;
          writeFileSync(path, rebuilt);
          console.log(`root changelog: promoted [Unreleased] into ${newVersion}`);
          GENEOF

          node /tmp/gen-root-changelog.mjs "$RELEASE_VERSION" "$TODAY"

      - name: Commit version bumps
        if: ${{ github.event.inputs.dry_run != 'true' && (github.event.inputs.version != 'none' || github.event.inputs.custom_version != '') }}
        env:
          TARGETS: ${{ steps.targets.outputs.targets }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/mcp/package.json packages/mcp/CHANGELOG.md \
                  packages/relayburn/package.json packages/relayburn/CHANGELOG.md \
                  packages/sdk-node/package.json packages/sdk-node/CHANGELOG.md \
                  packages/relayburn/npm/*/package.json \
                  packages/sdk-node/npm/*/package.json \
                  CHANGELOG.md \
                  Cargo.toml Cargo.lock \
                  crates/relayburn-cli/Cargo.toml crates/relayburn-sdk-node/Cargo.toml
          if git diff --cached --quiet; then
            echo "No version changes to commit."
          else
            declare -A DIRS
            while IFS=: read -r key dir; do
              [ -z "$key" ] && continue
              DIRS[$key]="$dir"
            done <<< "$TARGETS"

            MSG="chore(release):"
            for entry in ${{ steps.bump.outputs.versions }}; do
              key="${entry%%:*}"
              version="${entry##*:}"
              dir="${DIRS[$key]}"
              NPM_NAME=$(node -p "require('./$dir/package.json').name")
              MSG+=" $NPM_NAME@$version"
            done
            git commit -m "$MSG"
          fi

      # crates.io OIDC trusted publishing. The action exchanges this run's
      # GitHub OIDC identity for a short-lived CARGO_REGISTRY_TOKEN — same
      # trust model as the npm publish below, no long-lived secret.
      #
      # Both crates must be pre-registered as trusted publishers on
      # crates.io (Settings → Trusted Publishing → GitHub) for this to
      # mint a token.
      #
      # Cargo runs BEFORE npm so a crate-side failure aborts before npm
      # ships any tarball, pushes any tag, or commits any version bump.
      # Both publishes are gated on whether the version is already on
      # crates.io, making `version: none` re-runs idempotent for partial
      # failure recovery.
      #
      # Always mint the token, including on dry runs:
      #   1. `cargo publish --dry-run` historically required registry auth
      #      (and the requirement varies by cargo version), so passing a
      #      real token avoids version-dependent surprises on the runner.
      #   2. Running the OIDC exchange on every dry run validates that the
      #      crates.io trusted-publisher registration is healthy — the
      #      whole point of running a dry run before a real release.
      - name: Mint crates.io token via OIDC
        id: cargo-auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Cargo publish (sdk → cli)
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.cargo-auth.outputs.token }}
          RELEASE_VERSION: ${{ steps.bump.outputs.release_version }}
        run: |
          set -euo pipefail
          DRY=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY="--dry-run"
          fi
          VER="$RELEASE_VERSION"

          # Idempotent gate: skip if already on crates.io. Lets a partial
          # failure (e.g. npm step below) be retried with `version: none`.
          # `index.crates.io` shards by first-two/second-two of the crate
          # name (`re/la/relayburn-sdk`).
          sdk_published=$(curl -sf "https://index.crates.io/re/la/relayburn-sdk" 2>/dev/null \
            | grep -c "\"vers\":\"$VER\"" || true)
          if [ "$sdk_published" = "0" ]; then
            cargo publish -p relayburn-sdk $DRY
          else
            echo "relayburn-sdk@$VER already on crates.io — skipping"
          fi

          # Wait for the new SDK version to land in the sparse index so
          # the CLI's dep resolution sees it.
          if [ -z "$DRY" ] && [ "$sdk_published" = "0" ]; then
            found=0
            for i in $(seq 1 30); do
              if curl -sf "https://index.crates.io/re/la/relayburn-sdk" \
                 | grep -q "\"vers\":\"$VER\""; then
                echo "relayburn-sdk@$VER visible in index"
                found=1
                break
              fi
              echo "waiting for index... ($i/30)"
              sleep 10
            done
            if [ "$found" = "0" ]; then
              echo "::error title=Sparse index timeout::relayburn-sdk@$VER not visible in index after 30 attempts (5 min). Aborting CLI publish to avoid a misleading dep-resolution error."
              exit 1
            fi
          fi

          cli_published=$(curl -sf "https://index.crates.io/re/la/relayburn-cli" 2>/dev/null \
            | grep -c "\"vers\":\"$VER\"" || true)
          if [ "$cli_published" = "0" ]; then
            cargo publish -p relayburn-cli $DRY
          else
            echo "relayburn-cli@$VER already on crates.io — skipping"
          fi

      # Stage the prebuilt binary artifacts produced by the `build-cli` and
      # `build-sdk` reusable workflows. Each artifact name follows the
      # convention `relayburn-{cli,sdk}-<short>` (set in cli-build.yml +
      # napi-build.yml).
      #
      #   - cli artifacts contain a stripped `burn` binary; drop it at
      #     `packages/relayburn/npm/<short>/bin/burn` and chmod +x.
      #   - sdk artifacts contain `relayburn-sdk.<short>.node` (napi-rs
      #     emits that filename because `binaryName: "relayburn-sdk"` in
      #     packages/sdk-node/package.json); drop it at
      #     `packages/sdk-node/npm/<short>/relayburn-sdk.<short>.node`.
      #
      # If `napi build` ever changes its output filename (e.g. emits
      # `index.<short>.node`), the rename loop below catches it: anything
      # that's not already named `relayburn-sdk.<short>.node` gets renamed
      # so the per-platform package.json's `main` resolves correctly.
      - name: Download CLI binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/cli-artifacts
          pattern: relayburn-cli-*
          merge-multiple: false

      - name: Download SDK napi artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/sdk-artifacts
          pattern: relayburn-sdk-*
          merge-multiple: false

      - name: Stage prebuilt binaries into platform packages
        run: |
          set -euo pipefail
          for short in darwin-arm64 darwin-x64 linux-arm64-gnu linux-x64-gnu; do
            # CLI: drop `burn` at packages/relayburn/npm/<short>/bin/burn.
            #
            # `upload-artifact@v4` flattens single-file uploads to the
            # artifact root (the binary lands at
            # `/tmp/cli-artifacts/relayburn-cli-<short>/burn`, NOT at the
            # original `packages/relayburn/npm/<short>/bin/burn` path).
            # Locate the binary defensively with `find` so a future
            # upload-artifact behavior change can't silently break staging
            # — same pattern the SDK leg uses for `*.node`.
            cli_src_dir="/tmp/cli-artifacts/relayburn-cli-${short}"
            cli_dst_dir="packages/relayburn/npm/${short}/bin"
            if [ ! -d "$cli_src_dir" ]; then
              echo "::error title=Missing CLI artifact dir::expected $cli_src_dir" >&2
              ls -la /tmp/cli-artifacts/ 2>/dev/null || true
              exit 1
            fi
            cli_src=$(find "$cli_src_dir" -maxdepth 6 -name 'burn' -type f -print -quit)
            if [ -z "$cli_src" ]; then
              echo "::error title=Missing CLI artifact::no 'burn' file under $cli_src_dir" >&2
              ls -laR "$cli_src_dir" 2>/dev/null || true
              exit 1
            fi
            mkdir -p "$cli_dst_dir"
            cp "$cli_src" "$cli_dst_dir/burn"
            chmod +x "$cli_dst_dir/burn"
            ls -lh "$cli_dst_dir/burn"

            # SDK: napi-rs uploads packages/sdk-node/src/*.node — there's
            # only one .node file per matrix leg (the per-target binary).
            # Locate it generically rather than hard-coding the filename so
            # a `napi build` filename change doesn't silently break staging.
            sdk_src_dir="/tmp/sdk-artifacts/relayburn-sdk-${short}"
            if [ ! -d "$sdk_src_dir" ]; then
              echo "::error title=Missing SDK artifact dir::expected $sdk_src_dir" >&2
              ls -la /tmp/sdk-artifacts/ 2>/dev/null || true
              exit 1
            fi
            sdk_node_file=$(find "$sdk_src_dir" -maxdepth 2 -name '*.node' -print -quit)
            if [ -z "$sdk_node_file" ]; then
              echo "::error title=Missing .node artifact::no *.node file in $sdk_src_dir" >&2
              ls -la "$sdk_src_dir" 2>/dev/null || true
              exit 1
            fi
            sdk_dst="packages/sdk-node/npm/${short}/relayburn-sdk.${short}.node"
            cp "$sdk_node_file" "$sdk_dst"
            ls -lh "$sdk_dst"
          done

      # Ship-gate: verify the staged `burn` binaries actually carry the
      # release version we're about to publish. The cli-build smoke test
      # already asserts this per-leg against the `release_version` input,
      # but that check is upstream of artifact upload/download/staging.
      # Re-checking right before `npm publish` closes the loop against
      # any artifact mix-up between then and now.
      #
      # The publish runner is x64-linux, so we can only `exec` the
      # linux-x64-gnu binary natively. For the cross-built ones we fall
      # back to a byte-level grep for the expected version string —
      # clap embeds `CARGO_PKG_VERSION` as a literal in the binary's
      # rodata, so a `grep -aF` on the raw bytes is a reliable
      # cross-arch substitute (false positive: a version string that
      # incidentally appears as part of unrelated data, which is
      # negligible given the specificity of `burn X.Y.Z`).
      - name: Verify staged CLI binaries carry release version
        env:
          RELEASE_VER: ${{ needs.resolve-release-version.outputs.release_version }}
        run: |
          set -euo pipefail
          EXPECTED="burn $RELEASE_VER"
          fail=0
          for short in darwin-arm64 darwin-x64 linux-arm64-gnu linux-x64-gnu; do
            bin="packages/relayburn/npm/${short}/bin/burn"
            if [ ! -x "$bin" ]; then
              echo "::error title=Missing staged binary::$bin not found or not executable" >&2
              fail=1
              continue
            fi
            if [ "$short" = "linux-x64-gnu" ]; then
              actual=$("$bin" --version 2>&1 | head -1)
              if [ "$actual" != "$EXPECTED" ]; then
                echo "::error title=Binary version mismatch::$bin reported '$actual', expected '$EXPECTED'" >&2
                fail=1
              else
                echo "$bin: $actual ✓ (native exec)"
              fi
            else
              if grep -aF "$RELEASE_VER" "$bin" > /dev/null; then
                echo "$bin: contains '$RELEASE_VER' literal ✓ (byte-level check; can't exec cross-arch on Linux runner)"
              else
                echo "::error title=Binary version not embedded::$bin does not contain literal '$RELEASE_VER' — built with stale CARGO_PKG_VERSION?" >&2
                fail=1
              fi
            fi
          done
          if [ "$fail" -ne 0 ]; then
            exit 1
          fi

      # npm >= 11.5.1 is required for the OIDC trusted-publisher flow.
      - name: Install latest npm
        run: npm install -g npm@latest

      # Authentication note: this workflow does NOT use an NPM_TOKEN. It relies
      # on npm's OIDC trusted-publisher flow — the `id-token: write` permission
      # above lets `npm publish --provenance` exchange the GitHub workflow's
      # OIDC identity for a short-lived publish token. Each package must be
      # registered as a trusted publisher on npmjs.com under this
      # repo/workflow path for the first publish.
      #
      # Pipeline:
      #   - For workspace packages (mcp): `pnpm pack` rewrites `workspace:*`
      #     deps to concrete versions inside the tarball's package.json.
      #   - For non-workspace packages (relayburn umbrella, sdk-node
      #     umbrella, 8 platform packages): `npm pack` from the package's
      #     own directory. These packages live OUTSIDE the pnpm workspace
      #     (see pnpm-workspace.yaml's `!packages/{relayburn,sdk-node}`
      #     excludes, plus the platform packages are subdirs that pnpm
      #     doesn't auto-include) so `pnpm pack` from the workspace root
      #     can't resolve them by name.
      #
      # Then `npm publish <tarball>` uploads with `--provenance` (triggers
      # OIDC) on real runs, or `--dry-run` on dry runs.
      #
      # Publish order: platform packages first, then their umbrellas. This
      # ensures `npm install relayburn` (or `@relayburn/sdk`) post-publish
      # can resolve all four `optionalDependencies` immediately rather than
      # racing the registry's per-package propagation.
      - name: Pack + publish
        env:
          TARGETS: ${{ steps.targets.outputs.targets }}
        run: |
          set -euo pipefail
          PACK_DIR="$RUNNER_TEMP/packs"
          mkdir -p "$PACK_DIR"

          COMMON_FLAGS="--access public --tag ${{ github.event.inputs.tag }}"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            COMMON_FLAGS+=" --dry-run"
          else
            COMMON_FLAGS+=" --provenance"
          fi

          declare -A DIRS
          while IFS=: read -r key dir; do
            [ -z "$key" ] && continue
            DIRS[$key]="$dir"
          done <<< "$TARGETS"

          # Order matches `targets` output (platform packages → sdk umbrella
          # → mcp → relayburn umbrella).
          for entry in ${{ steps.bump.outputs.versions }}; do
            key="${entry%%:*}"
            version="${entry##*:}"
            dir="${DIRS[$key]}"
            NPM_NAME=$(node -p "require('./$dir/package.json').name")

            # Workspace-aware packing only for workspace packages. The mcp
            # package is the only entry that lives inside the pnpm
            # workspace (umbrellas + platform packages are excluded). Use
            # `pnpm pack` for it (rewrites `workspace:*` → concrete versions
            # at pack time); use `npm pack` from the package directory for
            # everyone else.
            if [ "$key" = "mcp" ]; then
              echo "==> Packing $NPM_NAME (pnpm)"
              # pnpm writes <name-without-@>-<ver>.tgz with `/` → `-`.
              # @relayburn/mcp@2.0.0 → relayburn-mcp-2.0.0.tgz
              TARBALL_BASENAME="$(echo "${NPM_NAME#@}" | tr '/' '-')-${version}.tgz"
              pnpm --filter "$NPM_NAME" pack --pack-destination "$PACK_DIR"
            else
              echo "==> Packing $NPM_NAME (npm, dir=$dir)"
              # `npm pack` writes <name-without-@>-<ver>.tgz with `/` → `-`.
              TARBALL_BASENAME="$(echo "${NPM_NAME#@}" | tr '/' '-')-${version}.tgz"
              (cd "$dir" && npm pack --pack-destination "$PACK_DIR")
            fi

            TARBALL="$PACK_DIR/$TARBALL_BASENAME"
            if [ ! -f "$TARBALL" ]; then
              echo "::error::could not find packed tarball $TARBALL_BASENAME in $PACK_DIR" >&2
              ls -la "$PACK_DIR" >&2 || true
              exit 1
            fi

            echo "==> Publishing $TARBALL $COMMON_FLAGS"
            npm publish "$TARBALL" $COMMON_FLAGS
          done

      # Annotated tags (-a) so `git push --follow-tags` actually pushes them;
      # lightweight tags are skipped by --follow-tags.
      #
      # Tag scheme:
      #   - `<key>-v<ver>` for each of the 11 npm targets (mcp-v…,
      #     relayburn-v…, sdk-v…, cli-darwin-arm64-v…, sdk-linux-x64-gnu-v…,
      #     etc.). The canonical release tag is `relayburn-v<ver>` — the
      #     create-release job below anchors the GitHub Release on it.
      #   - `relayburn-{sdk,cli}-v<ver>` for the two crates.io crates,
      #     reusing the same lockstep version. Disambiguated from the npm
      #     `sdk-v…` / (legacy) `cli-v…` tags via the `relayburn-` prefix.
      - name: Tag + push
        if: ${{ github.event.inputs.dry_run != 'true' && (github.event.inputs.version != 'none' || github.event.inputs.custom_version != '') }}
        env:
          TARGETS: ${{ steps.targets.outputs.targets }}
        run: |
          set -euo pipefail
          declare -A DIRS
          while IFS=: read -r key dir; do
            [ -z "$key" ] && continue
            DIRS[$key]="$dir"
          done <<< "$TARGETS"

          for entry in ${{ steps.bump.outputs.versions }}; do
            key="${entry%%:*}"
            version="${entry##*:}"
            dir="${DIRS[$key]}"
            NPM_NAME=$(node -p "require('./$dir/package.json').name")
            git tag -a "$key-v$version" -m "$NPM_NAME@$version"
            # crates.io tags. Lockstep, so reuse $version. Only emit on the
            # `sdk` (napi umbrella) entry to avoid duplicate tags across
            # the 11 npm targets.
            if [ "$key" = "sdk" ]; then
              git tag -a "relayburn-sdk-v$version" -m "relayburn-sdk@$version"
              git tag -a "relayburn-cli-v$version" -m "relayburn-cli@$version"
            fi
          done
          git push origin HEAD --follow-tags

      - name: Summary
        env:
          TARGETS: ${{ steps.targets.outputs.targets }}
          RELEASE_VERSION: ${{ steps.bump.outputs.release_version }}
        run: |
          set -euo pipefail
          declare -A DIRS
          while IFS=: read -r key dir; do
            [ -z "$key" ] && continue
            DIRS[$key]="$dir"
          done <<< "$TARGETS"

          {
            echo "### Published (npm)"
            echo ""
            for entry in ${{ steps.bump.outputs.versions }}; do
              key="${entry%%:*}"
              version="${entry##*:}"
              dir="${DIRS[$key]}"
              NPM_NAME=$(node -p "require('./$dir/package.json').name")
              echo "- \`$NPM_NAME@$version\`"
            done
            echo ""
            echo "### Published (crates.io)"
            echo ""
            echo "- \`relayburn-sdk@$RELEASE_VERSION\`"
            echo "- \`relayburn-cli@$RELEASE_VERSION\`"
            echo ""
            echo "- **dist-tag**: \`${{ github.event.inputs.tag }}\`"
            echo "- **dry run**: \`${{ github.event.inputs.dry_run }}\`"
            echo ""
            if [ "${{ github.event.inputs.dry_run }}" != "true" ]; then
              echo "Next step: verify the published artifact by running the \`Verify Publish\` workflow."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # One GitHub Release per publish run. All 11 npm tags are pushed above,
  # but the public GitHub Release is anchored to the `relayburn-v<ver>` tag
  # so the releases page has one item per version.
  create-release:
    name: Create GitHub Release
    needs: publish
    if: ${{ github.event.inputs.dry_run != 'true' && (github.event.inputs.version != 'none' || github.event.inputs.custom_version != '') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Resolve canonical release
        id: release
        run: |
          set -euo pipefail

          VER='${{ needs.publish.outputs.release_version }}'
          if [ -z "$VER" ]; then
            echo "::error title=Missing release version::publish job did not report a release_version output"
            exit 1
          fi

          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "tag_name=relayburn-v$VER" >> "$GITHUB_OUTPUT"
          if [[ "$VER" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Need the canonical tag that the publish job just pushed.
          ref: ${{ steps.release.outputs.tag_name }}

      - name: Build combined release notes
        id: notes
        env:
          VERSIONS: ${{ needs.publish.outputs.versions }}
          RELEASE_VERSION: ${{ needs.publish.outputs.release_version }}
        run: |
          cat > /tmp/build-release-notes.mjs << 'GENEOF'
          import { appendFileSync, existsSync, readFileSync, writeFileSync } from 'node:fs';

          const versionsRaw = process.env.VERSIONS || '';
          const releaseVersion = process.env.RELEASE_VERSION;

          // Display order: umbrellas first (the user-facing surfaces), then
          // platform packages (implementation detail, but worth listing for
          // completeness).
          const keyOrder = [
            'relayburn',
            'sdk',
            'mcp',
            'cli-darwin-arm64',
            'cli-darwin-x64',
            'cli-linux-arm64-gnu',
            'cli-linux-x64-gnu',
            'sdk-darwin-arm64',
            'sdk-darwin-x64',
            'sdk-linux-arm64-gnu',
            'sdk-linux-x64-gnu',
          ];

          // Mirror the targets table from publish.yml so we can resolve
          // package directories for changelog extraction.
          const dirByKey = new Map([
            ['mcp', 'packages/mcp'],
            ['relayburn', 'packages/relayburn'],
            ['sdk', 'packages/sdk-node'],
            ['cli-darwin-arm64', 'packages/relayburn/npm/darwin-arm64'],
            ['cli-darwin-x64', 'packages/relayburn/npm/darwin-x64'],
            ['cli-linux-arm64-gnu', 'packages/relayburn/npm/linux-arm64-gnu'],
            ['cli-linux-x64-gnu', 'packages/relayburn/npm/linux-x64-gnu'],
            ['sdk-darwin-arm64', 'packages/sdk-node/npm/darwin-arm64'],
            ['sdk-darwin-x64', 'packages/sdk-node/npm/darwin-x64'],
            ['sdk-linux-arm64-gnu', 'packages/sdk-node/npm/linux-arm64-gnu'],
            ['sdk-linux-x64-gnu', 'packages/sdk-node/npm/linux-x64-gnu'],
          ]);

          const entries = versionsRaw.trim().split(/\s+/).filter(Boolean).map((entry) => {
            const idx = entry.indexOf(':');
            return { key: entry.slice(0, idx), ver: entry.slice(idx + 1) };
          }).sort((a, b) => keyOrder.indexOf(a.key) - keyOrder.indexOf(b.key));

          if (entries.length === 0) {
            throw new Error('publish job did not report any package versions');
          }

          const packageInfo = entries.map(({ key, ver }) => {
            const dir = dirByKey.get(key);
            const pkgJson = JSON.parse(readFileSync(`${dir}/package.json`, 'utf8'));
            return {
              key,
              ver,
              dir,
              npmName: pkgJson.name,
              tag: `${key}-v${ver}`,
            };
          });

          function escapeRegExp(value) {
            return value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          }

          function extractChangelogBody(path, version) {
            if (!existsSync(path)) return '';
            const raw = readFileSync(path, 'utf8');
            const headerRe = new RegExp(`^## \\[${escapeRegExp(version)}\\][^\\n]*\\n`, 'm');
            const header = raw.match(headerRe);
            if (!header || header.index === undefined) return '';

            const start = header.index + header[0].length;
            const tail = raw.slice(start);
            const next = tail.match(/^## \[/m);
            const end = next && next.index !== undefined ? start + next.index : raw.length;
            return raw.slice(start, end).trim();
          }

          function nestChangelogHeadings(notes) {
            return notes.replace(/^(#{3,5}) /gm, '#$1 ');
          }

          const lines = ['## Packages', ''];
          for (const entry of packageInfo) {
            lines.push(`- \`${entry.npmName}@${entry.ver}\` (tag: \`${entry.tag}\`)`);
          }

          // Crates section — `relayburn-sdk` and `relayburn-cli` ship to
          // crates.io in lockstep with the npm umbrellas at the same
          // workspace version. Tags `relayburn-{sdk,cli}-v<ver>` are pushed
          // by the publish job's "Tag + push" step.
          lines.push('', '## Crates', '');
          lines.push(`- \`relayburn-sdk@${releaseVersion}\` (tag: \`relayburn-sdk-v${releaseVersion}\`) — https://crates.io/crates/relayburn-sdk/${releaseVersion}`);
          lines.push(`- \`relayburn-cli@${releaseVersion}\` (tag: \`relayburn-cli-v${releaseVersion}\`) — https://crates.io/crates/relayburn-cli/${releaseVersion}`);

          const rootNotes = extractChangelogBody('CHANGELOG.md', releaseVersion);
          // Only the umbrellas + mcp ship hand-curated changelogs; platform
          // packages don't (they're implementation detail tracking the
          // umbrella version).
          const narrativeKeys = new Set(['relayburn', 'sdk', 'mcp']);
          const packageNotes = packageInfo
            .filter((entry) => narrativeKeys.has(entry.key))
            .map((entry) => ({
              ...entry,
              notes: extractChangelogBody(`${entry.dir}/CHANGELOG.md`, entry.ver),
            }))
            .filter((entry) => entry.notes.length > 0);

          if (rootNotes.length > 0) {
            lines.push('', '## Release Notes', '', rootNotes);
          }

          if (packageNotes.length > 0) {
            lines.push('', '## Package Changelogs', '');
            for (const entry of packageNotes) {
              lines.push(`### ${entry.npmName}`, '', nestChangelogHeadings(entry.notes), '');
            }
          }

          if (rootNotes.length === 0 && packageNotes.length === 0) {
            lines.push('', '## Release Notes', '', '_No changelog entry was generated for this release._');
          }

          writeFileSync('/tmp/release-notes.md', `${lines.join('\n').trimEnd()}\n`);

          appendFileSync(process.env.GITHUB_OUTPUT, `release_name=relayburn@${releaseVersion}\n`);
          GENEOF

          node /tmp/build-release-notes.mjs

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release.outputs.tag_name }}
          name: ${{ steps.notes.outputs.release_name }}
          body_path: /tmp/release-notes.md
          prerelease: ${{ steps.release.outputs.prerelease }}
