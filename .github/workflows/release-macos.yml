name: Release (macOS app)

# Manual trigger: Actions tab → "Release (macOS app)" → Run workflow.
# Builds, signs, notarizes, and publishes the apps/macos menu bar app as a DMG.
# Uses a `macos-v*` tag scheme (and a moving `macos-latest` pointer) so it never
# touches burn's own `v*` CLI releases or their `latest` pointer.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    timeout-minutes: 60
    defaults:
      run:
        working-directory: apps/macos
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute date-based version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          YEAR="$(date +%Y)"
          MONTH="$((10#$(date +%m)))"
          COUNT="$(gh api --paginate "repos/${GITHUB_REPOSITORY}/releases" \
            --jq '.[].tag_name' | grep -Ec "^macos-v${YEAR}\.${MONTH}\." || true)"
          N="$((COUNT + 1))"
          VERSION="${YEAR}.${MONTH}.${N}"
          echo "Release #${N} for ${YEAR}-$(date +%m) -> macos-v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=macos-v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          PREVIOUS_TAG="$(git tag --sort=-version:refname | grep -E '^macos-v[0-9]' | grep -v "^${TAG}$" | head -n 1 || true)"
          NOTES_FILE="${RUNNER_TEMP}/release-notes.md"
          args=(-f "tag_name=${TAG}" -f "target_commitish=${GITHUB_SHA}")
          if [ -n "${PREVIOUS_TAG}" ]; then
            args+=(-f "previous_tag_name=${PREVIOUS_TAG}")
          fi
          gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            "${args[@]}" --jq ".body" > "${NOTES_FILE}"
          echo "notes_file=${NOTES_FILE}" >> "$GITHUB_OUTPUT"

      - name: Decode App Store Connect API key (.p8)
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          mkdir -p "$HOME/private_keys"
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$HOME/private_keys/AuthKey.p8"
          echo "APPLE_API_KEY=$HOME/private_keys/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Import Developer ID certificate
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/app-signing.keychain-db"
          KCPW="$(uuidgen)"
          echo "$CSC_LINK" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security create-keychain -p "$KCPW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KCPW" "$KEYCHAIN"
          security import "$RUNNER_TEMP/certificate.p12" -k "$KEYCHAIN" \
            -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KCPW" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" \
            $(security list-keychains -d user | sed s/\"//g)

      - name: Build, sign, notarize & package
        env:
          VERSION: ${{ steps.version.outputs.version }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          for attempt in 1 2 3; do
            if ./release.sh; then exit 0; fi
            echo "release attempt ${attempt} failed; retrying in 60s..."
            sleep 60
          done
          echo "release failed after 3 attempts"
          exit 1

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          DMG="dist/AgentLimit-arm64.dmg"
          # Versioned release (history). Not marked --latest: burn's own v* CLI
          # releases own the repo's "latest" pointer.
          gh release create "${TAG}" "${DMG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title "Agent Limit ${{ steps.version.outputs.version }}" \
            --notes-file "${{ steps.changelog.outputs.notes_file }}"
          # Moving pointer for a stable download URL:
          #   releases/download/macos-latest/AgentLimit-arm64.dmg
          gh release delete macos-latest --repo "${GITHUB_REPOSITORY}" --yes --cleanup-tag || true
          gh release create macos-latest "${DMG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title "Agent Limit (latest)" \
            --notes "Latest macOS app build — points at ${TAG}."

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agentlimit-macos-${{ github.run_id }}
          path: apps/macos/dist/*.dmg
          if-no-files-found: warn
          retention-days: 30
