name: CI

# Build + test the Rust workspace and remaining npm wrappers on every PR and
# on every push to main.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22.14.0'
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build npm wrappers
        run: pnpm -r --if-present run build

      - name: Run npm tests
        run: pnpm run test

  cargo-build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        # rust-toolchain.toml at the repo root pins the channel + components.
        # Run `rustup toolchain install` unconditionally so a stale preinstalled
        # `stable` on the runner image is upgraded to whatever the pinned
        # channel currently resolves to — otherwise a runner with an older
        # stable can silently violate the workspace `rust-version`.
        run: |
          rustup toolchain install
          rustup component add rustfmt clippy

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          # Include Cargo.lock in the cache key so `cargo update` (or a
          # transitive yank+replace) busts the cache even when no Cargo.toml
          # changed; otherwise restored target/ artifacts can reference stale
          # dependency code.
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Build workspace
        run: cargo build --workspace --all-targets

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace
